<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MEV Arb Bot Dashboard</title>
    <style>
      body{font-family: Arial, sans-serif; margin: 0; padding: 0;}
      header{background:#0b2948;color:#fff;padding:12px}
      .container{display:flex;gap:12px;padding:12px}
      .col{flex:1;background:#f7f7f7;padding:8px;border-radius:6px;height:80vh;overflow:auto}
      .item{padding:6px;border-bottom:1px solid #ddd}
      pre{white-space:pre-wrap}
    </style>
  </head>
  <body>
    <header><h3>MEV Arb Bot Dashboard</h3></header>
    <div class="container">
      <div class="col" id="opps"><h4>Opportunities</h4></div>
      <div class="col" id="trades"><h4>Trades</h4></div>
      <div class="col" id="logs"><h4>Logs & Errors</h4></div>
    </div>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="/main.js"></script>
  </body>
</html>
